<html lang="en"> 
 <head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>HAPPY NEW YEAR 2026</title> 
  <link rel="icon" type="image/jpeg" href="icon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&amp;display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="style.css"> 
 </head> 
 <body> 
  <div id="start-overlay">
    <h2 style="color:white; margin-bottom:30px; font-family:'Poppins';">READY FOR 2027?</h2>
    <button id="start-btn">START COUNTDOWN</button>
  </div>

  <canvas id="canvas"></canvas>
  <img src="qr.png" alt="QR Code" class="qr-code-top-right">
  <div class="wrapper" id="main-wrapper">
   <div class="wrapper">
     <a href="test.html" class="author">test</a>
     <div class="heading"> 
      <h3>Countdown!!!!!</h3>
   <br><br>
      <h1>2027 is coming in . . .</h1>
     </div> 
     <div class="countdown"> 
      <div class="box"> <span class="num" id="day-box">00</span> <span class="text">Days</span> </div> 
      <div class="box"> <span class="num" id="hr-box">00</span> <span class="text">Hours</span> </div> 
      <div class="box"> <span class="num" id="min-box">00</span> <span class="text">Minutes</span> </div> 
      <div class="box"> <span class="num" id="sec-box">00</span> <span class="text">Seconds</span> </div> 
     </div> 
    </div>
  </div>

  <audio id="sound-10min" src="audio_10m.wav" preload="auto"></audio>
  <audio id="sound-5min" src="audio_5m.wav" preload="auto"></audio>
  <audio id="sound-1min" src="audio_1m.wav" preload="auto"></audio>
  <audio id="countdown_10s" src="countdown_10s.wav" preload="auto"></audio>
  
  <script src="script.js"></script> 
 </body>
</html>
